# PostgreSQL Profile Configuration
# This profile is for local PostgreSQL development
# Use: mvn spring-boot:run -Dspring-boot.run.profiles=postgres

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/adventuredb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA/Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable H2 Console
spring.h2.console.enabled=false
