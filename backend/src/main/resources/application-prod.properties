# Production Configuration
spring.application.name=adventure-game

# Database - PostgreSQL with Render environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# CORS - Use environment variable
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# Server
server.port=${PORT:8080}

# Logging
logging.level.com.adventure=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Disable H2 Console
spring.h2.console.enabled=false

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Security
server.error.include-message=never
server.error.include-stacktrace=never
