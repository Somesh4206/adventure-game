# Application Configuration
spring.application.name=adventure-game

# Database - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/adventuredb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root123

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Disable H2 Console
spring.h2.console.enabled=false

# JWT
app.jwt.secret=YourSuperSecretJWTKeyThatShouldBeAtLeast256BitsLongForHMACSHA256Algorithm
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Server
server.port=8081

# Logging
logging.level.com.adventure=INFO

# PostgreSQL (Production) - Uncomment and configure for production
