# Application Configuration
spring.application.name=adventure-game

# Server - Render uses PORT env variable
server.port=${PORT:10000}

# Database - PostgreSQL (uses environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/adventuredb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# JWT
app.jwt.secret=${JWT_SECRET:YourSuperSecretJWTKeyThatShouldBeAtLeast256BitsLongForHMACSHA256Algorithm}
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Disable H2 Console
spring.h2.console.enabled=false

# Logging
logging.level.com.adventure=INFO
