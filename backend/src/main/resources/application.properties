# Application Configuration
spring.application.name=adventure-game

# Database - Use environment variables for production
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/adventuredb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable H2 Console
spring.h2.console.enabled=false

# JWT
app.jwt.secret=YourSuperSecretJWTKeyThatShouldBeAtLeast256BitsLongForHMACSHA256Algorithm
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Server
server.port=8081

# Logging
logging.level.com.adventure=INFO

