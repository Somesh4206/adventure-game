# Application Configuration
spring.application.name=adventure-game

# Server
server.port=${PORT:8081}

# Database - PostgreSQL (local and production)
spring.datasource.url=jdbc:postgresql://localhost:5432/adventuredb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
app.jwt.secret=${JWT_SECRET:YourSuperSecretJWTKeyThatShouldBeAtLeast256BitsLongForHMACSHA256Algorithm}
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Disable H2 Console
spring.h2.console.enabled=false

# Logging
logging.level.com.adventure=INFO
