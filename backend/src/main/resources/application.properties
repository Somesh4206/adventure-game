# Application Configuration
spring.application.name=adventure-game

# Database - PostgreSQL (Render provides DATABASE_URL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/adventuredb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable H2 Console
spring.h2.console.enabled=false

# JWT
app.jwt.secret=YourSuperSecretJWTKeyThatShouldBeAtLeast256BitsLongForHMACSHA256Algorithm
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Server
server.port=8081

# Logging
logging.level.com.adventure=INFO

# PostgreSQL (Production) - Uncomment and configure for production
# spring.datasource.url=jdbc:postgresql://localhost:5432/adventuredb
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=your_db_user
# spring.datasource.password=your_db_password
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
