version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: adventure-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      MYSQL_DATABASE: adventuredb
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - adventure-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adventure-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/adventuredb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root123}
      JWT_SECRET: ${JWT_SECRET:-YourSuperSecretJWTKeyThatShouldBeAtLeast256BitsLongForHMACSHA256Algorithm}
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - adventure-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${BACKEND_URL:-http://localhost:8080}
    container_name: adventure-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - adventure-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  adventure-network:
    driver: bridge
